<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" defer src="../scripts/gamMain.js"></script>
    <link rel="stylesheet" href="../styles/game.css">
     <link rel="icon" href="../favicon.ico" type="image/ico">
    <title>מלך הפלאפל- זירת המשחק</title>
</head>
<body>
    <main id="gameBoard">
        <header id="topBar">
            <div class="stat-box">זמן נותר: <span id="timerDisplay">2:00</span></div>
            <div class="stat-box">רמת קושי: <span id="levelDisplay">---</span></div>
        </header>
        <section id="centerArea">
            <div id="drawPile" class="deck-spot">
                <div class="card-count" id="deckCount">0</div>
                <p>ערימת משיכה</p>
            </div>

            <div id="discardPile" class="deck-spot">
                <p>ערימת השלכה</p>
                <div id="lastDiscarded"></div>
            </div>

            <div id="kingsGallery">
                <div id="kingsBank"></div>
            </div>
        </section>
        <div id="floatingCard" class="hidden"></div>
        <section id="playersContainer">
            <article class="player-zone" id="player1">
                <h2 class="player-name" id="p1Name">שחקן 1</h2>
                <div class="stand" id="p1Stand"></div>
                <div class="special-pile" id="p1Kings">
                    <h4>המלכים שלי:</h4>
                    <div class="kings-list" id="p1KingsList"></div>
                </div>
            </article>

            <article class="player-zone" id="player2">
                <h2 class="player-name" id="p2Name">שחקן 2</h2>
                <div class="stand" id="p2Stand"></div>
                <div class="special-pile" id="p2Kings">
                    <h4>המלכים שלי:</h4>
                    <div class="kings-list" id="p2KingsList"></div>
                </div>
            </article>
        </section>
        <div id="endGameModal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modalTitle">המשחק נגמר!</h2>
                <p id="winnerInfo"></p>
                <div class="modal-buttons">
                    <button id="btnRestart">שחק שוב</button>
                    <button id="btnLeaderboard">דף שיאים</button>
                    <button id="btnClose">סגור משחק</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
