<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מלך הפלפל- זירת המשחק</title>
</head>
<body>
    <main id="gameBoard">
        <header id="topBar">
            <div class="stat-box">זמן נותר: <span id="timerDisplay">10:00</span></div>
            <div class="stat-box">רמת קושי: <span id="levelDisplay">---</span></div>
        </header>
        <section id="centerArea">
            <div id="drawPile" class="deck-spot">
                <div class="card-count" id="deckCount">0</div>
                <p>ערימת משיכה</p>
            </div>

            <div id="discardPile" class="deck-spot">
                <p>ערימת השלכה</p>
                <div id="lastDiscarded"></div>
            </div>

            <div id="kingsGallery">
                <h3>בנק מלכי הפלאפל</h3>
                <div id="kingsBank"></div>
            </div>
        </section>
</body>
</html>
